<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description | escape }}">
    <link rel="stylesheet" href="{{ '/assets/css/site.css' | relative_url }}">
  </head>
  <body>
    <div class="site-shell">
      <aside class="sidebar" aria-label="Documentation navigation">
        <a class="brand" href="{{ '/' | relative_url }}">
          <span class="brand-title">{{ site.title }}</span>
          <span class="brand-subtitle">{{ site.description }}</span>
        </a>

        <nav class="nav">
          {% for group in site.docs_nav %}
            <section class="nav-section">
              <h2>{{ group.title }}</h2>
              <ul>
                {% for item in group.links %}
                  {% assign item_url = item.url | relative_url %}
                  {% assign page_url = page.url | relative_url %}
                  <li>
                    <a href="{{ item_url }}" {% if page_url == item_url %}aria-current="page"{% endif %}>
                      {{ item.title }}
                    </a>
                  </li>
                {% endfor %}
              </ul>
            </section>
          {% endfor %}
        </nav>
      </aside>

      <main class="content" id="content">
        <article class="doc">
          {{ content }}
        </article>
      </main>
    </div>
  </body>
</html>
